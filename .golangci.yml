run:
  timeout: 5m

linters:
  enable-all: true
  disable:
    # Deprecated
    - tenv            # replaced by usetesting

    # Too noisy / opinionated for this project
    - depguard
    - exhaustruct     # requires all struct fields — too strict for JSON parsing
    - gochecknoglobals # cobra requires globals
    - gochecknoinits   # cobra requires init()
    - lll             # line length — gofumpt handles formatting
    - varnamelen      # too opinionated on short var names
    - wsl             # whitespace linter — too noisy
    - nlreturn        # blank line before return — too noisy
    - funlen          # function length — trust judgment
    - godox           # flags TODOs — we want those during dev
    - err113          # requires wrapping all errors — too strict for a small project
    - wrapcheck       # same
    - testpackage     # requires _test package — not needed for internal tests
    - paralleltest    # requires t.Parallel() everywhere
    - ireturn         # flags interface returns — too strict
    - nonamedreturns  # named returns are fine when clear
    - tagliatelle     # wants camelCase JSON tags but Claude Code API uses snake_case
    - tagalign        # struct tag alignment — cosmetic
    - stylecheck      # package comments not needed for internal packages
    - gofumpt         # conflicts with default gofmt
    - godot           # comment periods — cosmetic
    - prealloc        # premature optimization
    - perfsprint      # premature optimization
    - mnd             # magic number detector — too strict for small projects
    - forbidigo       # no need to restrict print functions
    - nolintlint      # meta-linter about nolint directives
    - musttag         # struct tag validation — too strict
    - nilnil          # nil,nil returns are fine for "not found" semantics
    - nestif          # nested if complexity — trust judgment
    - gci             # import ordering — cosmetic
    - goconst         # repeated strings as constants — overkill for small project

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  gosec:
    severity: medium
    excludes:
      - G301  # directory permissions 0755 is fine for non-sensitive data
      - G304  # file path from variable is expected in a CLI tool
      - G306  # file permissions 0644 is fine for config files
      - G204  # subprocess with variable args is expected in notify package
      - G404  # weak RNG is fine for picking exercises
  gocyclo:
    min-complexity: 15
  gocognit:
    min-complexity: 40
  cyclop:
    max-complexity: 15
  revive:
    rules:
      - name: unexported-return
        disabled: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
