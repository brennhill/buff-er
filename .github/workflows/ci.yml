name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CGO_ENABLED: '0'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/buff-er

      - name: Test
        run: go test ./... -count=1

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...
