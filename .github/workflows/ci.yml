name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CGO_ENABLED: '0'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/buff-er

      - name: Test
        run: go test ./... -count=1

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Supply chain check
        run: |
          curl -fsSL https://github.com/brennhill/sloppy-joe/releases/latest/download/sloppy-joe-x86_64-unknown-linux-musl.tar.xz | tar xJ
          mkdir -p /tmp/sj
          cp sloppy-joe.suggested.json /tmp/sj/config.json
          SLOPPY_JOE_CONFIG=/tmp/sj/config.json ./sloppy-joe check
