name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o buff-er-${{ matrix.suffix }} \
            ./cmd/buff-er

      - uses: actions/upload-artifact@v5
        with:
          name: buff-er-${{ matrix.suffix }}
          path: buff-er-${{ matrix.suffix }}

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Create checksums
        run: sha256sum buff-er-* > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            buff-er-*
            checksums.txt

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./... -count=1 -race
