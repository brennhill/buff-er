<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="clock-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" rx="16" fill="#0f0d1a"/>

  <!-- Clock circle -->
  <circle cx="120" cy="85" r="50" fill="none" stroke="#4338ca" stroke-width="3"/>
  <circle cx="120" cy="85" r="46" fill="#1e1b4b" opacity="0.5"/>

  <!-- Clock hands -->
  <line x1="120" y1="85" x2="120" y2="52" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round"/>
  <line x1="120" y1="85" x2="145" y2="78" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round"/>
  <circle cx="120" cy="85" r="4" fill="#a5b4fc"/>

  <!-- Clock tick marks -->
  <line x1="120" y1="39" x2="120" y2="44" stroke="#6366f1" stroke-width="2"/>
  <line x1="120" y1="126" x2="120" y2="131" stroke="#6366f1" stroke-width="2"/>
  <line x1="74" y1="85" x2="79" y2="85" stroke="#6366f1" stroke-width="2"/>
  <line x1="161" y1="85" x2="166" y2="85" stroke="#6366f1" stroke-width="2"/>

  <!-- Timer text -->
  <text x="120" y="108" font-family="monospace" font-size="10" fill="#6366f1" text-anchor="middle">~5 min</text>

  <!-- Arrow between clock and person -->
  <line x1="178" y1="85" x2="210" y2="85" stroke="#4338ca" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="210,80 220,85 210,90" fill="#4338ca"/>

  <!-- Stretching person silhouette -->
  <!-- Head -->
  <circle cx="260" cy="42" r="12" fill="#a78bfa"/>
  <!-- Body -->
  <line x1="260" y1="54" x2="260" y2="95" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <!-- Left arm reaching up -->
  <path d="M260,65 Q240,45 230,35" stroke="#a78bfa" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Right arm reaching up -->
  <path d="M260,65 Q280,45 295,38" stroke="#a78bfa" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="260" y1="95" x2="245" y2="125" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="260" y1="95" x2="275" y2="125" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>

  <!-- Energy lines around person -->
  <line x1="300" y1="50" x2="315" y2="45" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="305" y1="65" x2="320" y2="62" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
  <line x1="302" y1="80" x2="317" y2="80" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>

  <!-- Text -->
  <text x="200" y="160" font-family="monospace" font-size="28" font-weight="bold" fill="#e0e7ff" text-anchor="middle">buff-er</text>
  <text x="200" y="182" font-family="monospace" font-size="12" fill="#6366f1" text-anchor="middle">get buff while you buffer</text>
</svg>
